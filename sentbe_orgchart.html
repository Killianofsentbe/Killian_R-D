  * { box-sizing: border-box; margin: 0; padding: 0; }

    background: #0f172a;
    color: #1e293b;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(10px);
  }
  header .logo-area { display: flex; align-items: center; gap: 14px; }
  header .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: white;
  }
  header h1 { font-size: 18px; font-weight: 700; color: white; letter-spacing: -0.3px; }
  header .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  header .stats { display: flex; gap: 20px; align-items: center; }
  header .stat-item { text-align: center; }
  header .stat-num { font-size: 22px; font-weight: 800; color: white; line-height: 1; }
  header .stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  header .stat-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.12); }
  header .date-badge {
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: #93c5fd;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  header .toggle-btns { display: flex; gap: 8px; margin-left: 12px; }
  header .toggle-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: #e2e8f0;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
  }
  header .toggle-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.28); }

  /* ─── GROUP LEGEND ─── */
  .legend {
    background: #1e293b;
    padding: 10px 40px;
    display: flex;
    gap: 24px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .legend-label { font-size: 11px; color: #64748b; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-text { font-size: 12px; color: #94a3b8; }
  .legend-count { font-size: 11px; color: #64748b; }

  /* ─── CHART WRAPPER ─── */
  .chart-wrapper {
    padding: 40px 60px 80px;
    overflow-x: auto;
    overflow-y: visible;
    min-height: calc(100vh - 100px);
  }
  .chart-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    min-width: 100%;
  }

  /* ─── TREE NODES ─── */
  .tree-node {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tree-children {
    display: flex;
    align-items: flex-start;
    position: relative;
    padding-top: 32px;
  }
  /* Horizontal connecting bar */
  .tree-children::before {
    content: '';
    position: absolute;
    top: 0;
    height: 2px;
    background: rgba(255,255,255,0.12);
  }
  /* Vertical line from parent node downward */
  .has-children > .node-card-wrap::after {
    content: '';
    display: block;
    width: 2px;
    height: 32px;
    background: rgba(255,255,255,0.12);
    margin: 0 auto;
  }
  /* Vertical line up to each child node */
  .tree-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px;
  }
  .tree-item > .connector-up {
    width: 2px;
    height: 0;
    background: rgba(255,255,255,0.12);
  }

  /* ─── NODE CARD ─── */
  .node-card-wrap { position: relative; }
  .node-card {
    background: #1e293b;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 13px 18px;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    min-width: 130px;
    max-width: 200px;
    text-align: center;
    user-select: none;
  }
  .node-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.18);
  }
  .node-card.collapsed { opacity: 0.85; }

  /* Color accent bar at top of card */
  .node-card::before {
    content: '';
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 3px;
    border-radius: 0 0 3px 3px;
    background: var(--accent, #3b82f6);
  }

  .card-name {
    font-size: 12.5px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.3;
    margin-top: 4px;
  }
  .card-person {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 5px;
    line-height: 1.3;
  }
  .card-role {
    font-size: 10px;
    color: #64748b;
    margin-top: 1px;
  }
  .card-count {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 10.5px;
    font-weight: 700;
    color: #94a3b8;
    margin-top: 8px;
  }
  .card-count span { color: white; }
  .new-badge {
    position: absolute;
    top: -7px; right: -7px;
    background: #ef4444;
    color: white;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .con-badge {
    display: inline-block;
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    color: #fbbf24;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .ssg-badge {
    display: inline-block;
    background: rgba(52,211,153,0.15);
    border: 1px solid rgba(52,211,153,0.3);
    color: #34d399;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .expand-icon {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 18px;
    background: #334155;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: #94a3b8;
    border: 1.5px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    z-index: 10;
  }
  .node-card:hover .expand-icon { background: #3b82f6; color: white; border-color: #3b82f6; }

  /* ─── ROOT / TOP-LEVEL CARDS ─── */
  .node-card.root {
    background: linear-gradient(135deg, #1e3a5f, #0f2444);
    border-color: rgba(59,130,246,0.3);
    min-width: 180px;
    padding: 16px 22px;
  }
  .node-card.root .card-name { font-size: 16px; color: white; }
  .node-card.root .card-person { font-size: 13px; color: #93c5fd; }
  .node-card.root .card-role { font-size: 11px; color: #60a5fa; }
  .node-card.root .card-count { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .node-card.root .card-count span { color: white; }

  .node-card.group-card {
    min-width: 160px;
    padding: 15px 20px;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    border-color: var(--border);
  }
  .node-card.group-card .card-name { font-size: 14px; }

  /* ─── COLLAPSED CHILDREN HIDDEN ─── */
  .tree-children.hidden { display: none; }
  .has-children.collapsed > .node-card-wrap::after { display: none; }

  /* ─── PEOPLE LIST (leaf nodes) ─── */
  .people-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    max-width: 180px;
    margin-top: 8px;
  }
  .person-chip {
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 10px;
    color: #94a3b8;
    white-space: nowrap;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }

  /* ─── TOOLTIP ─── */
  .tooltip {
    position: fixed;
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e2e8f0;
    pointer-events: none;
    z-index: 9999;
    display: none;
    max-width: 220px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .tooltip.visible { display: block; }
  .tooltip-name { font-weight: 700; font-size: 13px; color: white; }
  .tooltip-members { margin-top: 6px; }
  .tooltip-member { color: #94a3b8; font-size: 11px; line-height: 1.6; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tree-children:not(.hidden) { animation: fadeIn 0.2s ease; }
</style>

// ───────────────────────────────────────────────────────
//  RENDER FUNCTIONS
// ───────────────────────────────────────────────────────
function createCard(node) {
  const wrap = document.createElement('div');
  wrap.className = 'node-card-wrap';

  const card = document.createElement('div');
  card.className = 'node-card';
  if (node.isRoot)  card.classList.add('root');
  if (node.isGroup) {
    card.classList.add('group-card');
    card.style.setProperty('--bg1', node.groupBg[0]);
    card.style.setProperty('--bg2', node.groupBg[1]);
    card.style.setProperty('--border', node.groupBorder);
  }
  if (node.highlight) {
    card.style.border = '1.5px solid rgba(99,102,241,0.5)';
    card.style.boxShadow = '0 0 20px rgba(99,102,241,0.15)';
  }
  card.style.setProperty('--accent', node.accent || '#3b82f6');

  // NEW badge
  if (node.isNew) {
    const nb = document.createElement('div');
    nb.className = 'new-badge';
    nb.textContent = 'NEW';
    card.appendChild(nb);
  }

  // Name
  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = node.name;
  card.appendChild(name);

  // Person
  if (node.person) {
    const person = document.createElement('div');
    person.className = 'card-person';
    person.textContent = node.person;
    if (node.note === 'con') {
      const cb = document.createElement('span');
      cb.className = 'con-badge';
      cb.textContent = '겸';
      person.appendChild(cb);
    }
    if (node.note === 'ssg') {
      const sb = document.createElement('span');
      sb.className = 'ssg-badge';
      sb.textContent = 'SSG';
      person.appendChild(sb);
    }
    card.appendChild(person);
  }

  // Role
  if (node.role) {
    const role = document.createElement('div');
    role.className = 'card-role';
    role.textContent = node.role;
    card.appendChild(role);
  }

  // Count
  if (node.count !== undefined && node.count > 0) {
    const cnt = document.createElement('div');
    cnt.className = 'card-count';
    cnt.innerHTML = `<span>${node.count}</span>명`;
    card.appendChild(cnt);
  }

  // Members (leaf node)
  if (node.members && !node.children) {
    const pl = document.createElement('div');
    pl.className = 'people-list';
    node.members.slice(0, 5).forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'person-chip';
      chip.textContent = m;
      pl.appendChild(chip);
    });
    if (node.members.length > 5) {
      const more = document.createElement('span');
      more.className = 'person-chip';
      more.textContent = `+${node.members.length - 5}`;
      more.style.background = 'rgba(255,255,255,0.08)';
      pl.appendChild(more);
    }
    card.appendChild(pl);
  }

  // Expand icon (if has children)
  if (node.children && node.children.length > 0) {
    const icon = document.createElement('div');
    icon.className = 'expand-icon';
    icon.textContent = node.expanded ? '−' : '+';
    card.appendChild(icon);
  }

  wrap.appendChild(card);

  // Tooltip for member details
  if (node.members) {
    card.addEventListener('mouseenter', (e) => showTooltip(e, node));
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', hideTooltip);
  }

  return wrap;
}

function buildTree(node, depth = 0) {
  const treeNode = document.createElement('div');
  treeNode.className = 'tree-node';
  if (node.children && node.children.length > 0) {
    treeNode.classList.add('has-children');
    if (!node.expanded) treeNode.classList.add('collapsed');
  }

  const cardWrap = createCard(node);
  treeNode.appendChild(cardWrap);

  if (node.children && node.children.length > 0) {
    const childrenContainer = document.createElement('div');
    childrenContainer.className = 'tree-children';
    if (!node.expanded) childrenContainer.classList.add('hidden');

    // Calculate horizontal line width after render
    node.children.forEach((child, i) => {
      const item = document.createElement('div');
      item.className = 'tree-item';
      item.appendChild(buildTree(child, depth + 1));
      childrenContainer.appendChild(item);
    });

    treeNode.appendChild(childrenContainer);

    // Click to toggle
    const card = cardWrap.querySelector('.node-card');
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      const isCollapsed = treeNode.classList.contains('collapsed');
      treeNode.classList.toggle('collapsed', !isCollapsed);
      childrenContainer.classList.toggle('hidden', !isCollapsed);
      const icon = card.querySelector('.expand-icon');
      if (icon) icon.textContent = isCollapsed ? '−' : '+';
    });
  }

  return treeNode;
}

// Draw horizontal connector lines using ResizeObserver after layout
function drawConnectors() {
  document.querySelectorAll('.tree-children').forEach(container => {
    const items = container.querySelectorAll(':scope > .tree-item');
    if (items.length <= 1) {
      container.style.setProperty('--line-left', '50%');
      container.style.setProperty('--line-width', '0px');
      return;
    }
    const containerRect = container.getBoundingClientRect();
    const firstCard = items[0].querySelector('.node-card');
    const lastCard  = items[items.length - 1].querySelector('.node-card');
    if (!firstCard || !lastCard) return;
    const fr = firstCard.getBoundingClientRect();
    const lr = lastCard.getBoundingClientRect();
    const left  = fr.left + fr.width / 2 - containerRect.left;
    const right = lr.left + lr.width / 2 - containerRect.left;
    container.style.setProperty('--line-left', left + 'px');
    container.style.setProperty('--line-width', (right - left) + 'px');
  });
}

// Apply connector positions via CSS custom properties
const connectorStyle = document.createElement('style');
connectorStyle.textContent = `
  .tree-children::before {
    left: var(--line-left, 10%);
    width: var(--line-width, 80%);
  }
`;
document.head.appendChild(connectorStyle);

// ───────────────────────────────────────────────────────
//  TOOLTIP
// ───────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, node) {
  let html = `<div class="tooltip-name">${node.name}</div>`;
  if (node.members && node.members.length) {
    html += `<div class="tooltip-members">`;
    node.members.forEach(m => {
      html += `<div class="tooltip-member">· ${m}</div>`;
    });
    html += `</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY + 14) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ───────────────────────────────────────────────────────
//  INIT
// ───────────────────────────────────────────────────────
const chart = document.getElementById('chart');
chart.appendChild(buildTree(org));

// Draw connectors after layout
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    drawConnectors();
  });
});

// Redraw on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawConnectors, 100);
});

// Also redraw after any click (expand/collapse)
document.addEventListener('click', () => {
  setTimeout(drawConnectors, 250);
});

// ─── 전체 펼치기 / 접기 ───
function expandAll() {
  document.querySelectorAll('.tree-node.has-children').forEach(node => {
    node.classList.remove('collapsed');
    const children = node.querySelector(':scope > .tree-children');
    if (children) children.classList.remove('hidden');
    const icon = node.querySelector(':scope > .node-card-wrap .expand-icon');
    if (icon) icon.textContent = '−';
  });
  setTimeout(drawConnectors, 250);
}

function collapseAll() {
  document.querySelectorAll('.tree-node.has-children').forEach(node => {
    // 루트 노드(SentBe)는 접지 않음
    if (node.closest('#chart') === node) return;
    node.classList.add('collapsed');
    const children = node.querySelector(':scope > .tree-children');
    if (children) children.classList.add('hidden');
    const icon = node.querySelector(':scope > .node-card-wrap .expand-icon');
    if (icon) icon.textContent = '+';
  });
  setTimeout(drawConnectors, 250);
}
