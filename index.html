  /* ─── 다크 UI용 로컬 토큰 ─── */
  :root {
    --dark-bg-deep:   #0f172a;  /* 최심부 배경 */
    --dark-bg-base:   #1e293b;  /* 카드/패널 배경 */
    --dark-bg-panel:  #334155;  /* 확장 아이콘 등 */
    --dark-bg-hover:  #475569;  /* 호버 상태 */
    --dark-blue-deep: #1e3a5f;  /* 헤더 그라디언트 중간 */
    --dark-root-bg1:  #1e3a5f;  /* 루트 카드 그라디언트 시작 */
    --dark-root-bg2:  #0f2444;  /* 루트 카드 그라디언트 끝 */
    --dark-text-base: #f1f5f9;  /* 기본 카드 텍스트 */
    --dark-text-muted:#e2e8f0;  /* 버튼/밝은 텍스트 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    background: var(--dark-bg-deep);
    color: var(--dark-bg-base);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, var(--dark-bg-deep) 0%, var(--dark-blue-deep) 60%, var(--dark-bg-deep) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(10px);
  }
  header .logo-area { display: flex; align-items: center; gap: 14px; }
  header .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--color-sb500), var(--color-rb500));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: var(--color-g0);
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--color-g0); letter-spacing: -0.3px; }
  header .subtitle { font-size: 12px; color: var(--color-g400); margin-top: 2px; }
  header .stats { display: flex; gap: 20px; align-items: center; }
  header .stat-item { text-align: center; }
  header .stat-num { font-size: 22px; font-weight: 800; color: var(--color-g0); line-height: 1; }
  header .stat-label { font-size: 11px; color: var(--color-g400); margin-top: 2px; }
  header .stat-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.12); }
  header .date-badge {
    background: rgba(49,118,253,0.15);
    border: 1px solid rgba(49,118,253,0.3);
    color: var(--color-sb300);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  header .toggle-btns { display: flex; gap: 8px; margin-left: 12px; }
  header .toggle-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--dark-text-muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
  }
  header .toggle-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.28); }

  /* ─── ZOOM CONTROLS ─── */
  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 4px 8px;
  }
  .zoom-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--dark-text-muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    font-family: inherit;
    line-height: 1;
  }
  .zoom-btn:hover { background: var(--color-sb500); border-color: var(--color-sb500); color: var(--color-g0); }
  .zoom-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--color-g400);
    min-width: 38px;
    text-align: center;
  }
  .zoom-reset {
    background: none;
    border: none;
    color: var(--color-g450);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.18s;
  }
  .zoom-reset:hover { color: var(--color-sb300); }

  /* ─── SEARCH ─── */
  .search-wrap {
    position: relative;
    margin-left: 12px;
  }
  .search-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--color-g0);
    padding: 7px 36px 7px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    width: 200px;
    outline: none;
    transition: all 0.18s;
  }
  .search-input::placeholder { color: var(--color-g450); }
  .search-input:focus { border-color: var(--color-sb500); background: rgba(49,118,253,0.08); width: 240px; }
  .search-clear {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--color-g450);
    font-size: 14px; cursor: pointer;
    display: none;
    line-height: 1;
  }

  .node-card.search-dim { opacity: 0.2; }
  .person-chip.search-match-chip {
    background: rgba(49,118,253,0.25);
    color: var(--color-sb300);
    font-weight: 700;
  }

  .legend {
    background: var(--dark-bg-base);
    padding: 10px 40px;
    display: flex;
    gap: 24px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);

  .legend-label { font-size: 11px; color: var(--color-g450); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-text { font-size: 12px; color: var(--color-g400); }
  .legend-count { font-size: 11px; color: var(--color-g450); }

  .chart-wrapper {
    padding: 40px 60px 80px;
    overflow: auto;
    min-height: calc(100vh - 100px);
    cursor: grab;
  }
  .chart-wrapper:active { cursor: grabbing; }
  .chart-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    min-width: 100%;
    transform-origin: top center;
    transition: transform 0.15s ease;
  }

  /* ─── TREE NODES ─── */
  .tree-node {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tree-children {
    display: flex;
    align-items: flex-start;
    position: relative;
    padding-top: 32px;
  }
  /* Horizontal connecting bar */
  .tree-children::before {
    content: '';
    position: absolute;
    top: 0;
    height: 2px;
    background: rgba(255,255,255,0.12);
  }
  /* Vertical line from parent node downward */
  .has-children > .node-card-wrap::after {
    content: '';
    display: block;
    width: 2px;
    height: 32px;
    background: rgba(255,255,255,0.12);
    margin: 0 auto;
  }
  /* Vertical line up to each child node */
  .tree-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px;
  }
  .tree-item > .connector-up {
    width: 2px;
    height: 0;
    background: rgba(255,255,255,0.12);
  }

  /* ─── NODE CARD ─── */
  .node-card-wrap { position: relative; }
  .node-card {
    background: var(--dark-bg-base);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 13px 18px;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    min-width: 130px;
    max-width: 200px;
    text-align: center;
    user-select: none;
  }
  .node-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.18);
  }
  .node-card.collapsed { opacity: 0.85; }

  /* Color accent bar at top of card */
  .node-card::before {
    content: '';
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 3px;
    border-radius: 0 0 3px 3px;
    background: var(--accent, var(--color-sb500));
  }

  .card-name {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--dark-text-base);
    line-height: 1.3;
    margin-top: 4px;
  }
  .card-person {
    font-size: 11px;
    color: var(--color-g400);
    margin-top: 5px;
    line-height: 1.3;
  }
  .card-role {
    font-size: 10px;
    color: var(--color-g450);
    margin-top: 1px;
  }
  .card-count {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--color-g400);
    margin-top: 8px;
  }
  .card-count span { color: var(--color-g0); }
  .new-badge {
    position: absolute;
    top: -7px; right: -7px;
    background: var(--color-r500);
    color: var(--color-g0);
    font-size: 9px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .con-badge {
    display: inline-block;
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    color: #fbbf24;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .ssg-badge {
    display: inline-block;
    background: rgba(61,190,157,0.15);
    border: 1px solid rgba(61,190,157,0.3);
    color: var(--color-gr500);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .expand-icon {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 18px;
    background: var(--dark-bg-panel);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: var(--color-g400);
    border: 1.5px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    z-index: 10;
  }
  .node-card:hover .expand-icon { background: var(--color-sb500); color: var(--color-g0); border-color: var(--color-sb500); }

  /* ─── ROOT / TOP-LEVEL CARDS ─── */
  .node-card.root {
    background: linear-gradient(135deg, var(--dark-root-bg1), var(--dark-root-bg2));
    border-color: rgba(49,118,253,0.3);
    min-width: 180px;
    padding: 16px 22px;
  }
  .node-card.root .card-name { font-size: 16px; color: var(--color-g0); }
  .node-card.root .card-person { font-size: 13px; color: var(--color-sb300); }
  .node-card.root .card-role { font-size: 11px; color: var(--color-sb400); }
  .node-card.root .card-count { background: rgba(49,118,253,0.15); color: var(--color-sb300); }
  .node-card.root .card-count span { color: var(--color-g0); }

  .node-card.group-card {

  /* ─── COLLAPSED CHILDREN HIDDEN ─── */
  .tree-children.hidden { display: none; }
  .has-children.collapsed > .node-card-wrap::after { display: none; }

  /* ─── PEOPLE LIST (leaf nodes) ─── */
  .people-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    max-width: 180px;
    margin-top: 8px;
  }

    color: var(--color-g400);

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--dark-bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--dark-bg-panel); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dark-bg-hover); }

  /* ─── TOOLTIP ─── */
  .tooltip {
    position: fixed;

    to   { opacity: 1; transform: translateY(0); }

// ───────────────────────────────────────────────────────
//  RENDER FUNCTIONS
// ───────────────────────────────────────────────────────
function createCard(node) {
  const wrap = document.createElement('div');
  wrap.className = 'node-card-wrap';

  const card = document.createElement('div');
  card.className = 'node-card';
  if (node.isRoot)  card.classList.add('root');
  if (node.isGroup) {
    card.classList.add('group-card');
    card.style.setProperty('--bg1', node.groupBg[0]);
    card.style.setProperty('--bg2', node.groupBg[1]);
    card.style.setProperty('--border', node.groupBorder);
  }
  if (node.highlight) {
    card.style.border = '1.5px solid rgba(92,113,229,0.5)';
    card.style.boxShadow = '0 0 20px rgba(92,113,229,0.15)';
  }
  card.style.setProperty('--accent', node.accent || 'var(--color-sb500)');

  // NEW badge
  if (node.isNew) {
    const nb = document.createElement('div');
    nb.className = 'new-badge';
    nb.textContent = 'NEW';
    card.appendChild(nb);
  }

  // Name
  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = node.name;
  card.appendChild(name);

  // Person
  if (node.person) {
    const person = document.createElement('div');
    person.className = 'card-person';
    person.textContent = node.person;
    if (node.note === 'con') {
      const cb = document.createElement('span');
      cb.className = 'con-badge';
      cb.textContent = '겸';
      person.appendChild(cb);
    }
    if (node.note === 'ssg') {
      const sb = document.createElement('span');
      sb.className = 'ssg-badge';
      sb.textContent = 'SSG';
      person.appendChild(sb);
    }
    card.appendChild(person);
  }

  // Role
  if (node.role) {
    const role = document.createElement('div');
    role.className = 'card-role';
    role.textContent = node.role;
    card.appendChild(role);
  }

  // Count
  if (node.count !== undefined && node.count > 0) {
    const cnt = document.createElement('div');
    cnt.className = 'card-count';
    cnt.innerHTML = `<span>${node.count}</span>명`;
    card.appendChild(cnt);
  }

  // Members (leaf node)
  if (node.members && !node.children) {
    const pl = document.createElement('div');
    pl.className = 'people-list';
    node.members.slice(0, 5).forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'person-chip';
      chip.textContent = m;
      pl.appendChild(chip);
    });
    if (node.members.length > 5) {
      const more = document.createElement('span');
      more.className = 'person-chip';
      more.textContent = `+${node.members.length - 5}`;
      more.style.background = 'rgba(255,255,255,0.08)';
      pl.appendChild(more);
    }
    card.appendChild(pl);
  }

  // Expand icon (if has children)
  if (node.children && node.children.length > 0) {
    const icon = document.createElement('div');
    icon.className = 'expand-icon';
    icon.textContent = node.expanded ? '−' : '+';
    card.appendChild(icon);
  }

  wrap.appendChild(card);

  // Tooltip for member details
  if (node.members) {
    card.addEventListener('mouseenter', (e) => showTooltip(e, node));
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', hideTooltip);
  }

  return wrap;
}

function buildTree(node, depth = 0) {
  const treeNode = document.createElement('div');
  treeNode.className = 'tree-node';
  if (node.children && node.children.length > 0) {
    treeNode.classList.add('has-children');
    if (!node.expanded) treeNode.classList.add('collapsed');
  }

  const cardWrap = createCard(node);
  treeNode.appendChild(cardWrap);

  if (node.children && node.children.length > 0) {
    const childrenContainer = document.createElement('div');
    childrenContainer.className = 'tree-children';
    if (!node.expanded) childrenContainer.classList.add('hidden');

    // Calculate horizontal line width after render
    node.children.forEach((child, i) => {
      const item = document.createElement('div');
      item.className = 'tree-item';
      item.appendChild(buildTree(child, depth + 1));
      childrenContainer.appendChild(item);
    });

    treeNode.appendChild(childrenContainer);

    // Click to toggle
    const card = cardWrap.querySelector('.node-card');
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      const isCollapsed = treeNode.classList.contains('collapsed');
      treeNode.classList.toggle('collapsed', !isCollapsed);
      childrenContainer.classList.toggle('hidden', !isCollapsed);
      const icon = card.querySelector('.expand-icon');
      if (icon) icon.textContent = isCollapsed ? '−' : '+';
    });
  }

  return treeNode;
}

// Draw horizontal connector lines using ResizeObserver after layout
function drawConnectors() {
  document.querySelectorAll('.tree-children').forEach(container => {
    const items = container.querySelectorAll(':scope > .tree-item');
    if (items.length <= 1) {
      container.style.setProperty('--line-left', '50%');
      container.style.setProperty('--line-width', '0px');
      return;
    }
    const containerRect = container.getBoundingClientRect();
    const firstCard = items[0].querySelector('.node-card');
    const lastCard  = items[items.length - 1].querySelector('.node-card');
    if (!firstCard || !lastCard) return;
    const fr = firstCard.getBoundingClientRect();
    const lr = lastCard.getBoundingClientRect();
    const left  = fr.left + fr.width / 2 - containerRect.left;
    const right = lr.left + lr.width / 2 - containerRect.left;
    container.style.setProperty('--line-left', left + 'px');
    container.style.setProperty('--line-width', (right - left) + 'px');
  });
}

// Apply connector positions via CSS custom properties
const connectorStyle = document.createElement('style');
connectorStyle.textContent = `
  .tree-children::before {
    left: var(--line-left, 10%);
    width: var(--line-width, 80%);
  }
`;
document.head.appendChild(connectorStyle);

// ───────────────────────────────────────────────────────
//  TOOLTIP
// ───────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, node) {
  let html = `<div class="tooltip-name">${node.name}</div>`;
  if (node.members && node.members.length) {
    html += `<div class="tooltip-members">`;
    node.members.forEach(m => {
      html += `<div class="tooltip-member">· ${m}</div>`;
    });
    html += `</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY + 14) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

document.addEventListener('click', () => {

});

// ─── 전체 펼치기 / 접기 ───
function expandAll() {
  document.querySelectorAll('.tree-node.has-children').forEach(node => {
    node.classList.remove('collapsed');
    const children = node.querySelector(':scope > .tree-children');
    if (children) children.classList.remove('hidden');
    const icon = node.querySelector(':scope > .node-card-wrap .expand-icon');
    if (icon) icon.textContent = '−';
  });
  setTimeout(drawConnectors, 250);
}

function collapseAll() {
  document.querySelectorAll('.tree-node.has-children').forEach(node => {
    // 루트 노드(SentBe)는 접지 않음
    if (node.closest('#chart') === node) return;
    node.classList.add('collapsed');
    const children = node.querySelector(':scope > .tree-children');
    if (children) children.classList.add('hidden');
    const icon = node.querySelector(':scope > .node-card-wrap .expand-icon');
    if (icon) icon.textContent = '+';
  });
  setTimeout(drawConnectors, 250);
}

// ─── SEARCH ─────────────────────────────────────────────
function onSearch(query) {
  const q = query.trim().toLowerCase();
  const clearBtn = document.getElementById('searchClear');
  const countEl = document.getElementById('searchCount');

  clearBtn.style.display = q ? 'block' : 'none';

  if (!q) {
    clearSearch();
    return;
  }

  const allCards = document.querySelectorAll('.node-card');
  let matchCount = 0;

  allCards.forEach(card => {
    const wrap = card.closest('.tree-node');
    const nameEl = card.querySelector('.card-name');
    const personEl = card.querySelector('.card-person');
    const chips = card.querySelectorAll('.person-chip');

    const nameText   = nameEl   ? nameEl.textContent.toLowerCase()   : '';
    const personText = personEl ? personEl.textContent.toLowerCase() : '';

    // person-chip 개별 매칭
    let chipMatch = false;
    chips.forEach(chip => {
      const matched = chip.textContent.toLowerCase().includes(q);
      chip.classList.toggle('search-match-chip', matched);
      if (matched) chipMatch = true;
    });

    const isMatch = nameText.includes(q) || personText.includes(q) || chipMatch;

    card.classList.toggle('search-match', isMatch);
    card.classList.toggle('search-dim', !isMatch);

    if (isMatch) {
      matchCount++;
      // 부모 노드 자동 펼치기
      let parent = wrap ? wrap.parentElement : null;
      while (parent) {
        const parentNode = parent.closest('.tree-node.has-children');
        if (!parentNode) break;
        parentNode.classList.remove('collapsed');
        const children = parentNode.querySelector(':scope > .tree-children');
        if (children) children.classList.remove('hidden');
        const icon = parentNode.querySelector(':scope > .node-card-wrap .expand-icon');
        if (icon) icon.textContent = '−';
        parent = parentNode.parentElement;
      }
    }
  });

  countEl.style.display = 'block';
  countEl.textContent = matchCount > 0 ? `${matchCount}명 검색됨` : '검색 결과 없음';
  countEl.style.color = matchCount > 0 ? 'var(--color-sb300)' : 'var(--color-r500)';

  setTimeout(drawConnectors, 100);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchCount').style.display = 'none';
  document.querySelectorAll('.node-card').forEach(card => {
    card.classList.remove('search-match', 'search-dim');
  });
  document.querySelectorAll('.person-chip').forEach(chip => {
    chip.classList.remove('search-match-chip');
  });
}

// ─── ZOOM ───────────────────────────────────────────────
let currentZoom = 1;
const ZOOM_STEP = 0.1;
const ZOOM_MIN  = 0.3;
const ZOOM_MAX  = 2.0;

function applyZoom() {
  const inner = document.getElementById('chart');
  inner.style.transform = `scale(${currentZoom})`;
  inner.style.transformOrigin = 'top center';
  document.getElementById('zoomLabel').textContent = Math.round(currentZoom * 100) + '%';
}

function zoomIn() {
  currentZoom = Math.min(ZOOM_MAX, Math.round((currentZoom + ZOOM_STEP) * 10) / 10);
  applyZoom();
}

function zoomOut() {
  currentZoom = Math.max(ZOOM_MIN, Math.round((currentZoom - ZOOM_STEP) * 10) / 10);
  applyZoom();
}

function zoomReset() {
  currentZoom = 1;
  applyZoom();
}

// 마우스 휠 줌
document.querySelector('.chart-wrapper').addEventListener('wheel', function(e) {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    if (e.deltaY < 0) zoomIn();
    else zoomOut();
  }
}, { passive: false });

// 키보드 단축키: Ctrl/Cmd + +/-/0
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    else if (e.key === '-') { e.preventDefault(); zoomOut(); }
    else if (e.key === '0') { e.preventDefault(); zoomReset(); }
  }
});
